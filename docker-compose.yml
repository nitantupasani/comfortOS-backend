services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: /code/firebase-service-account.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-comfortos}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000,https://comfortos.netlify.app}
    volumes:
      - ./app:/code/app
      - ./firebase-service-account.json:/code/firebase-service-account.json:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
